name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/setup-new-repo-app-U7keJ
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build (base-href for project pages)
        run: npm run build -- --configuration production --base-href "/dividende-vs-salary/"

      - name: SPA fallback + disable Jekyll
        run: |
          cp dist/dividende-vs-salary/browser/index.html dist/dividende-vs-salary/browser/404.html
          touch dist/dividende-vs-salary/browser/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/dividende-vs-salary/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
